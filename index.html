<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق المعدات الثقيلة | KARASUMA</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; color: #333; }
        header { background-color: #2c3e50; color: #f39c12; padding: 20px; text-align: center; border-bottom: 5px solid #f39c12; }
        .container { max-width: 1100px; margin: 20px auto; padding: 10px; }
        .nav-bar { text-align: center; margin-bottom: 30px; }
        .add-btn { background-color: #f39c12; color: white; padding: 12px 25px; text-decoration: none; border-radius: 30px; font-weight: bold; transition: 0.3s; display: inline-block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #ddd; }
        .card-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 19px; font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
        .info-label { color: #f39c12; font-weight: bold; }
        .desc-text { background: #f9f9f9; padding: 10px; border-radius: 8px; font-size: 13px; margin: 10px 0; border-right: 3px solid #f39c12; line-height: 1.4; min-height: 60px; }
        .contact-box { background: #2c3e50; color: #f1c40f; padding: 10px; border-radius: 10px; text-align: center; margin-top: auto; }
        .contact-box a { color: inherit; text-decoration: none; font-size: 18px; font-weight: bold; }
        #loader { text-align: center; font-size: 20px; color: #f39c12; padding: 50px; }
    </style>
</head>
<body>

<header>
    <h1>سوق المعدات الثقيلة</h1>
</header>

<div class="container">
    <div class="nav-bar">
        <a href="add.html" class="add-btn">➕ أضف معدتك للبيع الآن</a>
    </div>

    <div id="loader">جاري تحميل أحدث المعدات... 🚜</div>
    <div class="grid" id="itemsGrid"></div>
</div>

<footer>
    <p>&copy; 2026 - موقع الحفارات والمعدات</p>
</footer>

<script>
    // القيم مباشرة لضمان العمل على كافة المتصفحات
    const SB_URL = "https://kppufnwlkivacajmknqt.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwcHVmbndsa2l2YWNham1rbnF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4OTM4NTksImV4cCI6MjA5MzQ2OTg1OX0.7dzD-AYIX6HWgJJ8mU522mviRTgeV11kTazrkJl-YYk";

    async function fetchItems() {
        const grid = document.getElementById('itemsGrid');
        const loader = document.getElementById('loader');

        try {
            const response = await fetch(`${SB_URL}/rest/v1/items?status=eq.approved&select=*`, {
                headers: {
                    'apikey': SB_KEY,
                    'Authorization': `Bearer ${SB_KEY}`
                }
            });

            if (!response.ok) throw new Error("فشل في جلب البيانات");

            const items = await response.json();
            loader.style.display = 'none';
            
            if (!items || items.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>لا توجد معدات معروضة حالياً.</p>";
                return;
            }

            grid.innerHTML = items.map(item => `
                <div class="card">
                    <img src="${item.image_url}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                    <div class="card-content">
                        <div class="card-title">${item.name}</div>
                        <div class="info-item"><span class="info-label">📅 الموديل:</span> ${item.year || 'غير محدد'}</div>
                        <div class="desc-text">${item.description || 'لا يوجد وصف'}</div>
                        <div class="contact-box">
                            <a href="tel:${item.phone}">📞 ${item.phone || 'اتصل للمعاينة'}</a>
                        </div>
                    </div>
                </div>
            `).join('');

        } catch (error) {
            console.error(error);
            loader.innerHTML = "حدث خطأ أثناء تحميل البيانات ❌";
        }
    }

    // تشغيل عند تحميل الصفحة
    window.onload = fetchItems;
</script>

</body>
</html>
