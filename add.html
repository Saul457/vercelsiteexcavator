<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة معدة ثقيلة</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; text-align: center; }
        .form-card { max-width: 450px; background: white; padding: 25px; border-radius: 20px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #555; text-align: right; }
        input[type="file"] { margin-bottom: 20px; width: 100%; }
        textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; resize: none; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        button { background-color: #f39c12; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 15px; }
        button:hover { background-color: #d35400; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>إرسال بيانات الحفارة</h2>
    <label>📷 اختر صورة الحفارة:</label>
    <input type="file" id="machine-image" accept="image/*">
    
    <label>📝 مواصفات المعدة:</label>
    <textarea id="machine-desc" rows="6" placeholder="اكتب النوع، الموديل، السعر.."></textarea>
    
    <button id="send-btn" onclick="sendToTelegram()">إرسال الطلب بشكل آمن</button>
</div>

<script>
async function sendToTelegram() {
    const photoInput = document.getElementById('machine-image');
    const description = document.getElementById('machine-desc').value;
    const btn = document.getElementById('send-btn');

    if (photoInput.files.length === 0 || description.trim() === "") {
        alert("الرجاء إكمال كافة البيانات أولاً!");
        return;
    }

    btn.innerText = "⏳ جاري الإرسال...";
    btn.disabled = true;

    const formData = new FormData();
    formData.append('photo', photoInput.files[0]);
    formData.append('caption', description);

    try {
        // الربط الصحيح مع Vercel API
        const response = await axios.post('/api/send-telegram', formData, {
            headers: { 'Content-Type': 'multipart/form-data' }
        });

        if (response.status === 200) {
            alert("✅ تم الإرسال بنجاح!");
            document.getElementById('machine-desc').value = "";
            photoInput.value = "";
        }
    } catch (error) {
        alert("❌ فشل الإرسال. تأكد من إعدادات السيرفر.");
        console.error(error);
    } finally {
        btn.innerText = "إرسال الطلب بشكل آمن";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
