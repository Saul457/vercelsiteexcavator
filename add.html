<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة معدة | KARASUMA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>إضافة معدة جديدة</h2>
        <div class="form-group">
            <label>اسم المعدة</label>
            <input type="text" id="itemName" placeholder="مثلاً: حفار هيونداي 2024">
        </div>
        <div class="form-group">
            <label>سنة الإصدار</label>
            <input type="text" id="itemYear" placeholder="مثلاً: 2024">
        </div>
        <div class="form-group">
            <label>رقم التواصل</label>
            <input type="text" id="itemPhone" placeholder="09xxxx">
        </div>
        <div class="form-group">
            <label>الوصف</label>
            <textarea id="itemDesc" placeholder="تفاصيل المعدة..."></textarea>
        </div>
        <div class="form-group">
            <label>صورة المعدة</label>
            <input type="file" id="itemFile" accept="image/*">
        </div>
        <button class="btn-upload" id="uploadBtn">🚀 رفع المعدة الآن</button>
        <div id="loadingStatus" class="loading">جاري الرفع...</div>
    </div>
    <script type="module" src="add.js"></script>
</body>
</html>
